<!DOCTYPE html>
<html>
<head>
  <title>JobMatch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>.status-applied {
  background: #e3f2fd;
  padding: 4px 8px;
  border-radius: 5px;
}

.status-interview {
  background: #fff3cd;
  padding: 4px 8px;
  border-radius: 5px;
}

.status-offer {
  background: #d4edda;
  padding: 4px 8px;
  border-radius: 5px;
}

.status-rejected {
  background: #f8d7da;
  padding: 4px 8px;
  border-radius: 5px;
}
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    .job {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>JobMatch</h1>

  <input id="company" placeholder="Company">
  <input id="position" placeholder="Position">

  <select id="status">
    <option>Applied</option>
    <option>Interview</option>
    <option>Offer</option>
    <option>Rejected</option>
  </select>

  <button onclick="addJob()">Add Job</button>

  <div id="jobs"></div>function saveJobs() {
  localStorage.setItem('jobs', JSON.stringify(jobs));
}

function loadJobs() {
  const saved = localStorage.getItem('jobs');
  if (saved) {
    jobs = JSON.parse(saved);
    renderJobs();
  }
}jobs.push({
  company,
  position,
  status
});

  <script>function getStatusClass(status) {
  switch(status.toLowerCase()) {
    case "applied":
      return "status-applied";
    case "interview":
      return "status-interview";
    case "offer":
      return "status-offer";
    case "rejected":
      return "status-rejected";
    default:
      return "";
  }
}
let jobs = [];

function renderJobs() {
  const container = document.getElementById('jobs');
  container.innerHTML = '';

  jobs.forEach((job, index) => {
    container.innerHTML += `
      <div class="job">
        <h3>${job.company}</h3>
        <p>${job.position}</p>
        <p>Status: ${job.status}</p>

        <button onclick="editJob(${index})">
          Edit
        </button>

        <button onclick="deleteJob(${index})">
          Delete
        </button>
      </div>
    `;
  });
}

function addJob() {
  const company = document.getElementById('company').value;
  const position = document.getElementById('position').value;
  const status = document.getElementById('status').value;

  if (!company || !position) {
    alert('Please enter company and position');
    return;
  }

  jobs.push({
    company,
    position,
    status
  });

  renderJobs();

  document.getElementById('company').value = '';
  document.getElementById('position').value = '';
}

function deleteJob(index) {
  jobs.splice(index, 1);
  renderJobs();
}

function editJob(index) {
  const company = prompt(
    'Company Name',
    jobs[index].company
  );

  if (company === null) return;

  const position = prompt(
    'Position',
    jobs[index].position
  );

  if (position === null) return;

  const status = prompt(
    'Status (Applied, Interview, Offer, Rejected)',
    jobs[index].status
  );

  if (status === null) return;

  jobs[index] = {
    company,
    position,
    status
  };

  renderJobs();
}
</script>
</body>
</html>
